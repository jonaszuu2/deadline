<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEADLINE™ v0.4</title>
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/win95.css">
  <link rel="stylesheet" href="/styles/game.css">
  <link rel="stylesheet" href="/styles/overlays.css">
  <link rel="stylesheet" href="/styles/animations.css">
</head>
<body>
<!-- ══ DESKTOP ══ -->
<div id="desktop">
  <div id="desktop-icons">
    <div class="dicon"><span class="di">💻</span>My Computer</div>
    <div class="dicon"><span class="di">🗑️</span>Recycle Bin</div>
    <div class="dicon"><span class="di">📁</span>HR Documents</div>
    <div class="dicon active"><span class="di">📋</span>DEADLINE™</div>
  </div>
  <div id="win-area">
    <div id="win">
      <div id="titlebar">
        <div class="tb-left">
          <span class="tb-ico">📋</span>
          <span class="tb-ttxt">DEADLINE™ — Performance Management Suite v0.4</span>
        </div>
        <div class="tb-btns">
          <div class="tb-btn">_</div>
          <div class="tb-btn">□</div>
          <div class="tb-btn" style="background:#c04040">✕</div>
        </div>
      </div>
      <div id="menubar">
        <span class="mn"><u>F</u>ile</span>
        <span class="mn"><u>W</u>eek</span>
        <span class="mn"><u>O</u>ptions</span>
        <span class="mn" onclick="openHelp()"><u>H</u>elp</span>
      </div>
      <div id="kpi-bar-outer"><div id="kpi-bar-inner"></div></div>
      <div id="win-body"></div>
      <div id="statusbar"></div>
    </div>
  </div>
</div>
<div id="taskbar">
  <button id="start-btn">🪟 <b>Start</b></button>
  <div class="tb-div"></div>
  <div class="task-btn">📋 DEADLINE™</div>
  <div id="tray"><span id="clock">00:00</span></div>
</div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
