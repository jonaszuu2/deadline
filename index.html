<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DEADLINE™ v0.4</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/base.css">
  <link rel="stylesheet" href="/styles/win95.css">
  <link rel="stylesheet" href="/styles/game.css">
  <link rel="stylesheet" href="/styles/overlays.css">
  <link rel="stylesheet" href="/styles/animations.css">
</head>
<body>
<div id="win">
  <div class="win-chrome">
    <div class="wc-dots">
      <div class="wc-dot" style="background:#ff5f56;"></div>
      <div class="wc-dot" style="background:#ffbd2e;"></div>
      <div class="wc-dot" style="background:#27c93f;"></div>
    </div>
    <div class="wc-title">DEADLINE™ — Performance Management Suite v0.4 &nbsp;|&nbsp; File &nbsp; Week &nbsp; Options &nbsp; <span onclick="openHelp()" style="cursor:pointer;color:inherit">Help</span></div>
    <div class="wc-btns">
      <span class="wc-btn" onclick="zoomOut()">A-</span>
      <span class="wc-btn" onclick="zoomIn()">A+</span>
    </div>
  </div>
  <div id="topbar"></div>
  <div id="win-body"></div>
  <div id="statusbar"></div>
</div>
<!-- keep kpi-bar-inner accessible for animation functions -->
<div id="kpi-bar-outer" style="display:none"><div id="kpi-bar-inner"></div></div>
<script type="module" src="/src/main.js"></script>
</body>
</html>
